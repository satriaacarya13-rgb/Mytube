<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MyTube</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

header{
background:red;
padding:15px;
font-size:22px;
}

video{
width:90%;
max-width:600px;
margin-top:20px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
background:#333;
color:white;
border:none;
border-radius:6px;
}

input{
padding:10px;
margin:5px;
}

#videos button{
display:block;
margin:10px auto;
width:200px;
}
</style>

</head>
<body>

<header>MyTube</header>

<h3>Nama Pengguna</h3>
<input id="username" placeholder="Masukkan nama">

<h3>Upload Video</h3>

<input id="title" placeholder="Judul video">
<input id="url" placeholder="Link video mp4">

<br>
<button onclick="addVideo()">Upload Video</button>

<br><br>

<video id="player" controls></video>

<h3>Daftar Video</h3>

<div id="videos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_Ef3qF-ivsqbWTA-IEFOS6twN_oFrEXE",
  authDomain: "mytube-1ded1.firebaseapp.com",
  projectId: "mytube-1ded1",
  storageBucket: "mytube-1ded1.firebasestorage.app",
  messagingSenderId: "205052426434",
  appId: "1:205052426434:web:8fac373c1ba16f2cf6635b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const player = document.getElementById("player");
const videosDiv = document.getElementById("videos");

async function loadVideos(){

videosDiv.innerHTML="";

const snapshot = await getDocs(collection(db,"videos"));

snapshot.forEach((doc)=>{

const data = doc.data();

const btn = document.createElement("button");

btn.innerText = data.title;

btn.onclick = ()=>{
player.src = data.url;
};

videosDiv.appendChild(btn);

});

}

window.addVideo = async function(){

const title = document.getElementById("title").value;
const url = document.getElementById("url").value;

await addDoc(collection(db,"videos"),{
title:title,
url:url
});

loadVideos();

}

loadVideos();

</script>

</body>
</html>
